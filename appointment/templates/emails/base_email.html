<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .email-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .email-header {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            padding: 32px;
            text-align: center;
        }
        .email-header h1 {
            color: white;
            margin: 0;
            font-size: 28px;
        }
        .email-header p {
            color: rgba(255,255,255,0.85);
            margin: 8px 0 0;
            font-size: 14px;
        }
        .email-body {
            padding: 32px;
        }
        .email-body h2 {
            color: #2c3e50;
            font-size: 24px;
            margin-top: 0;
        }
        .email-body p {
            color: #495057;
            margin: 12px 0;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #0d6efd;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #6c757d;
            font-size: 14px;
        }
        .info-value {
            font-weight: 600;
            color: #212529;
            text-align: right;
        }
        .btn {
            display: inline-block;
            background: #0d6efd;
            color: white !important;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin: 16px 0;
        }
        .btn:hover {
            background: #0b5ed7;
        }
        .email-footer {
            background: #f8f9fa;
            padding: 24px;
            text-align: center;
            color: #6c757d;
            font-size: 13px;
        }
        .email-footer p {
            margin: 8px 0;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }
        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }
        .status-paid {
            background: #d4edda;
            color: #155724;
        }
        .highlight-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 16px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .highlight-box strong {
            color: #856404;
        }
        @media only screen and (max-width: 600px) {
            .email-wrapper {
                margin: 0;
                border-radius: 0;
            }
            .email-body {
                padding: 20px;
            }
            .info-row {
                flex-direction: column;
            }
            .info-value {
                text-align: left;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-header">
            <h1>💊 VitalBook</h1>
            <p>Your Health, Our Priority</p>
        </div>
        <div class="email-body">
            {% block content %}{% endblock %}
        </div>
        <div class="email-footer">
            <p><strong>© 2026 VitalBook.</strong> All rights reserved.</p>
            <p>Need help? Contact us at <a href="mailto:support@vitalbook.in" style="color: #0d6efd;">support@vitalbook.in</a></p>
            <p>📞 +91 98765 43210</p>
            <p style="font-size:11px; color:#adb5bd; margin-top: 16px;">
                This is an automated email. Please do not reply directly to this message.
            </p>
        </div>
    </div>
</body>
</html>
